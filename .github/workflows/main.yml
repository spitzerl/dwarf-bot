name: Deploy Discord Bot to VPS

on:
  push:
    branches:
      - main  # Déclenche le workflow si vous poussez sur la branche `main`.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3 # Récupère le code depuis votre repository.

    - name: Set up SSH agent
      uses: webfactory/ssh-agent@v0.5.3 # Pour configurer l'accès SSH.
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }} # Clé privée configurée dans les Secrets de GitHub.

    - name: Deploy to VPS
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << 'EOF'
        cd ~/dwarf-bot
        git pull origin main  # Met à jour le code source sur le VPS.
        npm install           # Installe les dépendances.
        pm2 restart discord-bot # Redémarre votre bot avec PM2.
        EOF
